name: Generate Snake Animation

on:
  # run every day at midnight
  schedule:
    - cron: "0 0 * * *"
  # vfq start manual
  workflow_dispatch:
  # Запускать при пуше в main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Здесь настраиваются цвета! 
          # color_snake=#cc5500 делает саму змейку тёмно-оранжевой.
          outputs: |
            dist/github-snake.svg?color_snake=#cc5500
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#cc5500
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Пушим сгенерированные файлы в отдельную ветку "output"
      - name: push github-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
